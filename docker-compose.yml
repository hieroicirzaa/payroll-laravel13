x-laravel-app: &laravel-app
  build:
    context: .
    dockerfile: Dockerfile
  image: payroll_laravel13_app:fixed

services:
  setup:
    <<: *laravel-app
    container_name: payroll_setup
    restart: "no"
    init: true
    env_file:
      - .env.docker
    command: >
      sh -lc "set -e;
      echo '[setup] Installing Composer dependencies...';
      composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader;
      echo '[setup] Installing NPM dependencies...';
      npm install;
      echo '[setup] Building frontend assets...';
      npm run build;
      echo '[setup] Clearing Laravel cache...';
      php artisan optimize:clear;
      echo '[setup] Running database migrations...';
      php artisan migrate --force;
      echo '[setup] Running database seeders...';
      php artisan db:seed --force;
      echo '[setup] Done.'"
    volumes:
      - ./:/var/www/html
      - payroll_vendor:/var/www/html/vendor
      - payroll_node_modules:/var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - payroll_network

  app:
    <<: *laravel-app
    container_name: payroll_app
    restart: unless-stopped
    init: true
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
      - payroll_vendor:/var/www/html/vendor
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - payroll_network

  web:
    image: nginx:1.27-alpine
    container_name: payroll_web
    restart: unless-stopped
    init: true
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html:ro
      - payroll_vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - payroll_network

  # Optional hot-reload Vite dev server.
  # It is not started by default because setup already runs `npm run build`.
  # Start it only when needed with: docker compose --profile dev up -d vite
  vite:
    <<: *laravel-app
    container_name: payroll_vite
    profiles:
      - dev
    restart: unless-stopped
    init: true
    env_file:
      - .env.docker
    environment:
      VITE_DOCKER: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: sh -lc "npm install && npm run dev:docker"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - payroll_vendor:/var/www/html/vendor
      - payroll_node_modules:/var/www/html/node_modules
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - payroll_network

  queue:
    <<: *laravel-app
    container_name: payroll_queue
    restart: unless-stopped
    init: true
    env_file:
      - .env.docker
    command: >
      sh -lc "until php artisan migrate:status >/dev/null 2>&1; do
      echo '[queue] Waiting for database migrations...'; sleep 5; done;
      php artisan queue:work --sleep=3 --tries=3 --timeout=120"
    volumes:
      - ./:/var/www/html
      - payroll_vendor:/var/www/html/vendor
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - payroll_network

  scheduler:
    <<: *laravel-app
    container_name: payroll_scheduler
    restart: unless-stopped
    init: true
    env_file:
      - .env.docker
    command: >
      sh -lc "until php artisan migrate:status >/dev/null 2>&1; do
      echo '[scheduler] Waiting for database migrations...'; sleep 5; done;
      while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
      - payroll_vendor:/var/www/html/vendor
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - payroll_network

  postgres:
    image: postgres:16-alpine
    container_name: payroll_postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: payroll_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - payroll_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroll_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payroll_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: payroll_mailpit
    restart: unless-stopped
    init: true
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - payroll_network

volumes:
  payroll_pgdata:
  payroll_vendor:
  payroll_node_modules:

networks:
  payroll_network:
    driver: bridge
